name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: "zulu"
        java-version: "17"

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: "3.22.0"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Build APK with Flet
      run: |
        flet build apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MathMate-Android-APK
        path: build/apk/*.apk
